services:
  - type: web
    name: tombola-dfco
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
